<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葫芦娃贪吃蛇游戏</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #382a3d;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #78c272;
            background-color: #2a223c;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #f9d67c;
            font-family: Arial, sans-serif;
            font-size: 20px;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #f9d67c;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        #gameOver {
            position: absolute;
            display: none;
            color: #eb6b6f;
            font-family: Arial, sans-serif;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="score">分数: 0</div>
    <div id="controls">
        方向键控制 | 空格暂停 | R键重新开始
    </div>
    <div id="gameOver">
        游戏结束!<br>
        按R键重新开始
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');

        // 游戏设置
        const gridSize = 20;
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;
        let score = 0;
        let gameSpeed = 100; // 毫秒
        let gameRunning = true;
        let gameOver = false;

        // 蛇的初始设置
        let snake = [
            {x: 10, y: 10}
        ];
        let direction = 'right';
        let nextDirection = 'right';

        // 食物
        let food = {};
        let foodType = 'normal'; // normal 或 golden

        // 加载图片
        const snakeHeadImg = new Image();
        snakeHeadImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAACXBIWXMAAAsTAAALEwEAmpwYAAABBElEQVR4nO2UMU7DQBBF3xYUFMkVETW5QA6QI1DTUXABCpqIlgtwAzpKJCSfgIYj0FBAQUeRCPEEDKuVd+2NLRoKfullLM/8eTO7Xvg3G+AEKPUdYAgsgRvgGOhpQVPgDngBvoA3jV2orsNXYA7MgKH24Z4r4AG4BnaAPeAMeAJ+gAtgpPEZ8Aj4ZpG9kNgucKh5U+DCMNhXm1KFSw3mgC3RYbGlxiutNdV3Xetm0bhxwZZ4ZAlLH7gWG+a6Zw5TYuJXVrDxM11vrR6w1Fc2n9f5T10ZBEuiLfWgNWPTygnKDQY1lZNbJVgbcNRSOWsD6nJy8q68cKfJ5aRyqk5W++fmF/UZbEhVLH1FAAAAAElFTkSuQmCC';

        const foodImg = new Image();
        foodImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAACXBIWXMAAAsTAAALEwEAmpwYAAABDklEQVR4nO2UMU7DMBSGvxQxwMTOBTgCR+gRmNmpXJApTKzpFVgZGRASJ4CZAxSkDoyMiKH+pUjGiuPYDgMDn/RLlv/nvX9s5z34b5PAKTAHlsANcACMgQlwAbwCH8Ab8AjsxTbnwJPGlzqzBHaBvKm5Ai6BA+AYuAIetXkKFMAgVkh9WOWGWLdoQFEdlsA+cCeJDVGkLgR2Kckt4ErMH7R/JqlZ4DgkKA1fgG1ga0NIbAu41h6Tb47d4DmwcQSX+j7rIOh7TtV3oT1JjZLYTMcvHSa7wJOwT2KcbAB52vOvDbE5MBeruVQZY2AKfAKzmhQIrCf6l7HqUSjApKOgOdCgpnISV46cq7JTOUXLzf5/+wZnDW3m+dL57wAAAABJRU5ErkJggg==';

        const goldenFoodImg = new Image();
        goldenFoodImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAACXBIWXMAAAsTAAALEwEAmpwYAAABD0lEQVR4nO2UMU7DMBSGvxQxwFR2LsARcoQegZkp3IApndiaK7CyMCAkbgAzByioDoyMiKH+pVjGiuPYDgMDn/RLkf33vX9s5z34b2PgDJgBC+AWOABGQB+4AF6BT+ANeAL2Y5tT4FnjC51ZALtA3tRcAZfAIXAM3AhP2jwDCqAXKyT/WeWGWLdoQFEdFsA+cC+JDTFQHT49xNwKI8T8USxmkpoFjkKC0vAV2Aa2NoTE2mIZ9pg8OMELYCsgeJL1WQdB33Oivsuw6JLYTJ8vAya7wLPYJ0k42QDytOcfG2JzYC5Wc6kyRsAE+ALuapIgsJ7oX8aqR6EAk46C5kCPmspJXDlyrspO5RQtN/v/7RtoAm0RL6kzKwAAAABJRU5ErkJggg==';

        // 生成随机食物
        function createFood() {
            foodType = Math.random() < 0.2 ? 'golden' : 'normal';
            food = {
                x: Math.floor(Math.random() * gridWidth),
                y: Math.floor(Math.random() * gridHeight)
            };
            
            // 确保食物不会出现在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    createFood();
                    return;
                }
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#2a223c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    // 蛇头 - 蛇精图像
                    ctx.drawImage(snakeHeadImg, snake[i].x * gridSize, snake[i].y * gridSize, gridSize, gridSize);
                } else {
                    // 蛇身
                    ctx.fillStyle = '#eb6b6f';
                    ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize, gridSize);
                }
            }
            
            // 绘制食物
            if (foodType === 'golden') {
                ctx.drawImage(goldenFoodImg, food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            } else {
                ctx.drawImage(foodImg, food.x * gridSize, food.y * gridSize, gridSize, gridSize);
            }
            
            // 更新分数
            scoreElement.textContent = `分数: ${score}`;
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;
            if (gameOver) return;
            
            setTimeout(function() {
                direction = nextDirection;
                moveSnake();
                checkCollision();
                draw();
                gameLoop();
            }, gameSpeed);
        }

        // 移动蛇
        function moveSnake() {
            let newHead = {x: snake[0].x, y: snake[0].y};
            
            // 根据方向移动蛇头
            if (direction === 'right') newHead.x++;
            if (direction === 'left') newHead.x--;
            if (direction === 'up') newHead.y--;
            if (direction === 'down') newHead.y++;
            
            // 添加新的蛇头
            snake.unshift(newHead);
            
            // 检查是否吃到食物
            if (newHead.x === food.x && newHead.y === food.y) {
                // 增加分数
                if (foodType === 'golden') {
                    score += 30;
                } else {
                    score += 10;
                }
                
                // 创建新食物
                createFood();
                
                // 增加游戏速度
                if (gameSpeed > 50) {
                    gameSpeed -= 1;
                }
            } else {
                // 如果没吃到食物，移除蛇尾
                snake.pop();
            }
        }

        // 检查碰撞
        function checkCollision() {
            const head = snake[0];
            
            // 检查是否撞墙
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                endGame();
                return;
            }
            
            // 检查是否撞到自己
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return;
                }
            }
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            gameOverElement.style.display = 'block';
        }

        // 重置游戏
        function resetGame() {
            snake = [{x: 10, y: 10}];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 100;
            gameOver = false;
            gameOverElement.style.display = 'none';
            createFood();
            
            if (!gameRunning) {
                gameRunning = true;
                gameLoop();
            }
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            // 方向控制
            if (e.key === 'ArrowUp' && direction !== 'down') {
                nextDirection = 'up';
            } else if (e.key === 'ArrowDown' && direction !== 'up') {
                nextDirection = 'down';
            } else if (e.key === 'ArrowLeft' && direction !== 'right') {
                nextDirection = 'left';
            } else if (e.key === 'ArrowRight' && direction !== 'left') {
                nextDirection = 'right';
            }
            
            // 暂停/继续
            if (e.key === ' ') {
                gameRunning = !gameRunning;
                if (gameRunning && !gameOver) {
                    gameLoop();
                }
            }
            
            // 重新开始
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            }
        });

        // 移动设备控制
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, false);
        
        document.addEventListener('touchmove', function(e) {
            if (!touchStartX || !touchStartY) {
                return;
            }
            
            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;
            
            let deltaX = touchEndX - touchStartX;
            let deltaY = touchEndY - touchStartY;
            
            // 检测主要方向
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动
                if (deltaX > 0 && direction !== 'left') {
                    nextDirection = 'right';
                } else if (deltaX < 0 && direction !== 'right') {
                    nextDirection = 'left';
                }
            } else {
                // 垂直滑动
                if (deltaY > 0 && direction !== 'up') {
                    nextDirection = 'down';
                } else if (deltaY < 0 && direction !== 'down') {
                    nextDirection = 'up';
                }
            }
            
            // 重置开始点
            touchStartX = touchEndX;
            touchStartY = touchEndY;
            e.preventDefault();
        }, false);
        
        // 初始化
        createFood();
        draw();
        gameLoop();
    </script>
</body>
</html>
